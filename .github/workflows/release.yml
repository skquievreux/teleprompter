name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyinstaller -r requirements.txt

      - name: Sync VERSION constant to the release tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          (Get-Content teleprompter.py) -replace '^VERSION = ".*"', "VERSION = ""$version""" | Set-Content teleprompter.py

      - run: pyinstaller --onefile --windowed --name teleprompter --icon assets/icon.ico --add-data "assets;assets" teleprompter.py

      - name: Build installer (Inno Setup, preinstalled on windows-latest)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version installer\teleprompter.iss

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/teleprompter.exe
            dist/teleprompter-setup.exe

      - name: Publish to download CDN
        shell: bash
        run: |
          for f in teleprompter.exe teleprompter-setup.exe; do
            curl -sf -X POST https://cdn.runitfast.xyz \
              -H "X-Upload-Secret: ${{ secrets.WORKER_UPLOAD_SECRET }}" \
              -F "bucket=softwaredistro" \
              -F "filename=$f" \
              -F "file=@dist/$f;type=application/octet-stream"
          done

      - name: Update Scoop manifest
        if: ${{ secrets.SCOOP_BUCKET_TOKEN != '' }}
        shell: pwsh
        env:
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $hash = (Get-FileHash dist/teleprompter.exe -Algorithm SHA256).Hash.ToLower()

          git clone "https://x-access-token:$env:SCOOP_BUCKET_TOKEN@github.com/skquievreux/scoop-bucket.git" scoop-bucket
          $manifestPath = "scoop-bucket/bucket/teleprompter.json"
          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
          $manifest.version = $version
          $manifest.url = "https://github.com/skquievreux/teleprompter/releases/download/${{ github.ref_name }}/teleprompter.exe"
          $manifest.hash = $hash
          $manifest | ConvertTo-Json -Depth 10 | Set-Content $manifestPath

          cd scoop-bucket
          git config user.name "teleprompter-release-bot"
          git config user.email "actions@github.com"
          git add bucket/teleprompter.json
          git commit -m "chore: update teleprompter manifest to v$version"
          git push
