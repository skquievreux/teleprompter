name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyinstaller -r requirements.txt

      - run: pyinstaller --onefile --windowed --name teleprompter teleprompter.py

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/teleprompter.exe

      - name: Publish to download CDN
        shell: bash
        run: |
          curl -sf -X POST https://cdn.runitfast.xyz \
            -H "X-Upload-Secret: ${{ secrets.WORKER_UPLOAD_SECRET }}" \
            -F "bucket=softwaredistro" \
            -F "filename=teleprompter.exe" \
            -F "file=@dist/teleprompter.exe;type=application/octet-stream"
