name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyinstaller -r requirements.txt

      - run: pyinstaller --onefile --windowed --name teleprompter teleprompter.py

      - name: Build installer (Inno Setup, preinstalled on windows-latest)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version installer\teleprompter.iss

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/teleprompter.exe
            dist/teleprompter-setup.exe

      - name: Publish to download CDN
        shell: bash
        run: |
          for f in teleprompter.exe teleprompter-setup.exe; do
            curl -sf -X POST https://cdn.runitfast.xyz \
              -H "X-Upload-Secret: ${{ secrets.WORKER_UPLOAD_SECRET }}" \
              -F "bucket=softwaredistro" \
              -F "filename=$f" \
              -F "file=@dist/$f;type=application/octet-stream"
          done
